<h1>Editar lista</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="titulo" value="{{tarea.titulo}}">
    <br>
    <textarea name="descripcion">{{titulo.descripcion}}</textarea>
    <br>
    <label>
        Completada:
        <input type="checkbox" name="estado" {% if tarea.estado %}checked{% endif %}>

    </label>

    <button type="submit">Actualizar</button>
</form>
